<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Verkaufs-Karte 3D – Kunden & Firmen</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
:root{
  --ui-bg:#fff;
  --ui-text:#0f172a;
  --ui-muted:#475569;
  --ui-border:rgba(15,23,42,.12);
  --ui-soft:rgba(15,23,42,.05);
  --ui-shadow:0 12px 34px rgba(2,6,23,.12);
  --inp-bg:#fff;
  --inp-text:#0f172a;
  --inp-border:rgba(15,23,42,.18);
  --btn-bg:rgba(15,23,42,.06);
  --btn-border:rgba(15,23,42,.14);
  --btn-primary:#22c55e;
  --cust:#5b21b6;
  --firm:#9ca3af;
  --highlight:#e11d48;
}

body.dark{
  --ui-bg:#0b1220;
  --ui-text:#e5e7eb;
  --ui-muted:#a3adc2;
  --ui-border:rgba(148,163,184,.18);
  --ui-soft:rgba(148,163,184,.10);
  --inp-bg:#0f172a;
  --inp-text:#e5e7eb;
  --inp-border:rgba(148,163,184,.22);
  --btn-bg:rgba(148,163,184,.10);
  --btn-border:rgba(148,163,184,.22);
  --firm:#94a3b8;
  --highlight:#fb7185;
}

*{box-sizing:border-box}

html,body,#map{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:#020617;
}

#map{
  position:fixed;
  inset:0;
  z-index:1;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:3000;
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-wrap:wrap;
  padding:10px 12px;
  border-radius:0 0 14px 14px;
  background:var(--ui-bg);
  border:1px solid var(--ui-border);
  border-top:none;
  box-shadow:var(--ui-shadow);
  font:14px/1.2 system-ui,Arial;
  color:var(--ui-text);
}

.brandBlock{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.brand{
  font-weight:900;
  white-space:nowrap;
}

.field{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field label{
  font-size:11px;
  color:var(--ui-muted);
  margin-left:2px;
}

.field input,
.field select,
.brandBlock select{
  height:34px;
  padding:0 10px;
  border-radius:10px;
  border:1px solid var(--inp-border);
  background:var(--inp-bg);
  color:var(--inp-text);
  outline:none;
  min-width:120px;
}

.w240{min-width:240px}
.w160{min-width:160px}
.w140{min-width:140px}

.btn{
  height:34px;
  padding:0 12px;
  border-radius:10px;
  border:1px solid var(--btn-border);
  background:var(--btn-bg);
  color:var(--ui-text);
  cursor:pointer;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn.primary{
  background:var(--btn-primary);
  border-color:var(--btn-primary);
  color:#052e16;
}

.pill{
  align-self:center;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--ui-border);
  background:var(--ui-soft);
  white-space:nowrap;
  font-weight:900;
  color:var(--ui-text);
  display:flex;
  gap:8px;
  align-items:center;
}

#loadStatus{
  margin-left:auto;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(148,163,184,.8);
  display:inline-block;
}

.ac{
  position:absolute;
  z-index:4000;
  background:var(--ui-bg);
  border:1px solid var(--ui-border);
  border-radius:12px;
  box-shadow:var(--ui-shadow);
  overflow-y:auto;
  overflow-x:hidden;
  font:14px/1.2 system-ui,Arial;
  color:var(--ui-text);
  max-height:260px;
  min-width:320px;
  display:none;
}

.ac .item{
  padding:10px 12px;
  border-bottom:1px solid var(--ui-border);
  cursor:pointer;
}

.ac .item:hover{
  background:var(--ui-soft);
}

.ac .name{
  font-weight:900;
}

.ac .addr,
.ac .tag{
  font-size:12px;
  color:var(--ui-muted);
  margin-top:3px;
}

.panel{
  position:absolute;
  top:88px;
  right:12px;
  z-index:2500;
  width:720px;
  max-height:calc(100vh - 110px);
  display:flex;
  flex-direction:column;
  background:var(--ui-bg);
  border:1px solid var(--ui-border);
  border-radius:16px;
  box-shadow:var(--ui-shadow);
  overflow:hidden;
  font:14px/1.25 system-ui,Arial;
  color:var(--ui-text);
}

.panel.hidden{
  display:none;
}

.panel-h{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  background:var(--ui-soft);
  border-bottom:1px solid var(--ui-border);
}

.panel-h .t{
  font-weight:900;
}

.panel-h .x{
  width:30px;
  height:30px;
  border-radius:10px;
  border:1px solid var(--ui-border);
  background:var(--ui-soft);
  color:var(--ui-text);
  cursor:pointer;
  font-weight:900;
}

.panel-b{
  padding:10px 12px;
  overflow:auto;
}

.kpis{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.kpi{
  border:1px solid var(--ui-border);
  background:var(--ui-soft);
  border-radius:14px;
  padding:10px;
}

.kpi .h{
  font-size:12px;
  color:var(--ui-muted);
}

.kpi .v{
  font-weight:900;
  font-size:16px;
  margin-top:2px;
}

.small{
  font-size:12px;
  color:var(--ui-muted);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:10px 6px;
  border-bottom:1px solid var(--ui-border);
  vertical-align:top;
  text-align:left;
}

th{
  font-size:12px;
  color:var(--ui-muted);
  font-weight:900;
  position:sticky;
  top:0;
  background:var(--ui-bg);
}

tr{
  cursor:pointer;
}

tr:hover{
  background:var(--ui-soft);
}

.badge{
  display:inline-block;
  padding:3px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid var(--ui-border);
  background:var(--ui-soft);
  white-space:nowrap;
  color:var(--ui-text);
}

.multiSelect{
  position:relative;
  min-width:160px;
}

.multiSelectBtn{
  width:100%;
  height:34px;
  padding:0 10px;
  border-radius:10px;
  border:1px solid var(--inp-border);
  background:var(--inp-bg);
  color:var(--inp-text);
  text-align:left;
  cursor:pointer;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.multiSelectMenu{
  position:absolute;
  top:38px;
  left:0;
  z-index:5000;
  display:none;
  background:var(--ui-bg);
  border:1px solid var(--ui-border);
  border-radius:12px;
  box-shadow:var(--ui-shadow);
  padding:6px;
  width:190px;
  max-height:220px;
  overflow-y:auto;
  overflow-x:hidden;
}

.multiSelectMenu.open{
  display:block;
}

.multiSelectMenu label{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  color:var(--ui-text);
  font-size:13px;
  min-height:24px;
}

.cesium-viewer-bottom,
.cesium-viewer-animationContainer,
.cesium-viewer-timelineContainer,
.cesium-viewer-fullscreenContainer{
  display:none!important;
}

@media(max-width:760px){
  .topbar .desktopOnly{
    display:none!important;
  }

  #miniKpi{
    display:none;
  }

  .panel{
    position:fixed!important;
    left:10px!important;
    right:10px!important;
    top:auto!important;
    bottom:10px!important;
    width:auto!important;
    max-height:72vh;
  }

  .kpis{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div id="map"></div>

<div class="topbar">
  <div class="brandBlock">
    <select id="searchType">
      <option value="kunden" selected>Kunden</option>
      <option value="firmen">Firmen</option>
    </select>
    <div class="brand">Verkaufs-Karte 3D</div>
  </div>

  <div class="field w240 desktopOnly">
    <label>Suche</label>
    <input id="custSearch" placeholder="Name / Ort …">
  </div>

  <div class="field w140 desktopOnly">
    <label>Produkt</label>
    <select id="product">
      <option value="lose">Lose</option>
      <option value="sackware">Sackware</option>
      <option value="industrieware">Industrieware</option>
    </select>
  </div>

  <div class="field w160 desktopOnly">
    <label>Zertifikat</label>
    <div class="multiSelect">
      <button type="button" class="multiSelectBtn" id="certificateBtn">Alle Zertifikate</button>
      <div class="multiSelectMenu" id="certificateMenu">
        <label><input type="checkbox" value="enplus"> EnPlus</label>
        <label><input type="checkbox" value="dinplus"> DINplus</label>
        <label><input type="checkbox" value="sure"> SURE</label>
        <label><input type="checkbox" value="cpp"> CPP</label>
        <label><input type="checkbox" value="kein zertifikat"> Kein Zertifikat</label>
      </div>
    </div>
  </div>

  <div class="field w140 desktopOnly" id="radiusWrapDesktop">
    <label>Radius (km)</label>
    <input id="radiusKm" type="number" min="0" value="250">
  </div>

  <button class="btn desktopOnly" id="btnZoneDraw">✏️ Zone</button>
  <button class="btn desktopOnly" id="btnZoneFinish">✅ Fertig</button>
  <button class="btn desktopOnly" id="btnZoneClear">🧹 Zone</button>

  <div class="field w140 desktopOnly">
    <label>Menge (t)</label>
    <input id="qtyT" type="number" min="0.1" step="0.1" value="24">
  </div>

  <div class="field w140 desktopOnly">
    <label>Fracht €/km</label>
    <input id="freightPerKm" type="number" step="0.01" value="1.85">
  </div>

  <div class="field w140 desktopOnly">
    <label>Faktor</label>
    <input id="factor" type="number" step="0.01" value="1.05" min="0" max="10">
  </div>

  <div class="field w140 desktopOnly">
    <label>Ziel-VK €/t</label>
    <input id="targetVk" type="number" step="0.01" placeholder="optional">
  </div>

  <button class="btn" id="btnTheme">🌙</button>
  <button class="btn primary" id="btnCalc">Berechnen</button>
  <button class="btn desktopOnly" id="btnGeo">Geocoden</button>

  <div class="pill" id="loadStatus">
    <span class="dot"></span> —
  </div>
</div>

<div id="ac" class="ac"></div>

<div id="panel" class="panel hidden">
  <div id="panelHeader" class="panel-h">
    <div class="t">Ergebnisse</div>
    <button id="closePanel" class="x">✕</button>
  </div>

  <div class="panel-b">
    <div class="kpis">
      <div class="kpi">
        <div class="h" id="kpiOriginLabel">Ausgangspunkt</div>
        <div class="v" id="kpiCustomer">—</div>
        <div class="small" id="kpiCustomerAddr">—</div>
      </div>

      <div class="kpi">
        <div class="h">Treffer</div>
        <div class="v" id="kpiCount">—</div>
        <div class="small" id="kpiQty">Menge: —</div>
      </div>

      <div class="kpi">
        <div class="h">Routing</div>
        <div class="v" id="kpiRoute">—</div>
        <div class="small" id="kpiRouteHint">Klick auf Zeile lädt Strecke</div>
      </div>
    </div>

    <div class="small" style="margin:6px 0 10px">
      <b>3D-Globus:</b> Ziehen = drehen · Mausrad = zoomen.
      <br>
      <b>Modus Kunden:</b> Kunde auswählen → Firmen-Vorschläge.
      <br>
      <b>Modus Firmen:</b> Firma auswählen → Kunden-Vorschläge.
    </div>

    <div id="results"></div>
  </div>
</div>

<script>
const CONFIG={
  firmsCsvUrl:"https://docs.google.com/spreadsheets/d/1f1oD1TlYWPRbD12d05yIGkqmXVygVt3ZHLk9U0bKoTs/gviz/tq?tqx=out:csv&gid=0",
  customersCsvUrl:"https://docs.google.com/spreadsheets/d/1DaiLyZbhJkdSQ1PHbJQmguIrDnGrrhiAVgJC4PJO8vA/gviz/tq?tqx=out:csv&gid=0",
  geocodeDelayMs:1100,
  routeTimeoutMs:15000,
  routeRetryCount:2,
  routeRetryDelayMs:500,
  routeConcurrency:2
};

const LS_GEO_CACHE_KEY="salesMap_geoCache_v25_globe";
const LS_ROUTE_CACHE_KEY="salesMap_routeCache_v4_globe";
const LS_THEME_KEY="salesMap_theme_v12";
const LS_ZONE_KEY="salesMap_zone_globe_v1";

let viewer;
let customers=[];
let firms=[];
let selectedCustomer=null;
let selectedFirm=null;
let customerEntities=[];
let firmEntities=[];
let routeEntity=null;
let zoneEntity=null;
let zonePoints=[];
let drawingZone=false;
let drawPointEntities=[];
let geoCache=loadLS(LS_GEO_CACHE_KEY,{});
let routeCache=loadLS(LS_ROUTE_CACHE_KEY,{});
let lastResults=[];
let markerStateById=new Map();
let hasCalculatedOnce=false;

window.addEventListener("load",()=>{
  init().catch(err=>{
    console.error("INIT ERROR:",err);
    alert("Fehler beim Laden. Öffne F12 → Konsole.");
  });
});

async function init(){
  applyThemeFromLS();

 viewer=new Cesium.Viewer("map",{
  animation:false,
  timeline:false,
  baseLayerPicker:false,
  geocoder:false,
  homeButton:true,
  sceneModePicker:false,
  navigationHelpButton:false,
  fullscreenButton:false,
  infoBox:true,
  selectionIndicator:true,
  imageryProvider:new Cesium.OpenStreetMapImageryProvider({
    url:"https://tile.openstreetmap.org/"
  }),
  terrainProvider:new Cesium.EllipsoidTerrainProvider()
}); 

  viewer.scene.globe.enableLighting=true;
  viewer.scene.globe.depthTestAgainstTerrain=false;

  viewer.camera.setView({
    destination:Cesium.Cartesian3.fromDegrees(10.4,51.2,4500000)
  });

  initUI();
  initSearch();
  initCertificateFilters();
  initGlobeClickHandlers();

  setLoadStatus("Lade Tabellen …");

  await loadCustomers();
  await loadFirms();

  applyCacheCoordsOnly();
  restoreZoneFromLS();
  renderMarkers();
  updateOriginKpi(null);
  updateLoadStatusCounts("✅ geladen");
  updateModeUI();
}
function saveLS(k,o){
  try{localStorage.setItem(k,JSON.stringify(o));}catch(e){}
}

function loadLS(k,f){
  try{
    const s=localStorage.getItem(k);
    return s?JSON.parse(s):f;
  }catch(e){
    return f;
  }
}

function esc(s){
  return String(s??"").replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function str(v){return v==null?"":String(v)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function fmt(n,d=2){return isFinite(n)?n.toFixed(d).replace(".",","):"—"}

function toNum(v){
  if(v==null)return NaN;
  if(typeof v==="number")return v;
  let s=String(v).trim();
  if(!s)return NaN;
  s=s.replace(/[€\s]/g,"");
  if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",",".");
  else if(s.includes(","))s=s.replace(",",".");
  else s=s.replace(/,/g,"");
  const n=parseFloat(s);
  return Number.isFinite(n)?n:NaN;
}

function normText(s){
  return String(s||"")
    .trim()
    .toLowerCase()
    .replace(/\s+/g," ")
    .replace(/[.,;:_/\\|()\-–—]/g,"")
    .replace(/ä/g,"ae")
    .replace(/ö/g,"oe")
    .replace(/ü/g,"ue")
    .replace(/ß/g,"ss");
}

function normAddr(a){
  return String(a||"").trim().toLowerCase().replace(/\s+/g," ");
}

function isYes(v){
  const s=String(v??"").trim().toLowerCase();
  return ["ja","yes","y","1","true","ok","x"].includes(s);
}

function parseCsv(url){
  return new Promise((resolve,reject)=>{
    const cb="gvizCb_"+Math.random().toString(36).slice(2);

    window[cb]=data=>{
      try{
        const cols=(data.table.cols||[]).map((c,i)=>
          String(c.label||c.id||("spalte_"+i)).trim().toLowerCase()
        );

        const rows=(data.table.rows||[]).map(row=>{
          const o={};
          (row.c||[]).forEach((cell,i)=>{
            o[cols[i]||("spalte_"+i)]=cell&&cell.v!=null?cell.v:"";
          });
          return o;
        });

        cleanup();
        resolve(rows);
      }catch(e){
        cleanup();
        reject(e);
      }
    };

    const script=document.createElement("script");

    function cleanup(){
      delete window[cb];
      script.remove();
    }

    script.src=url.replace("tqx=out:csv","tqx=responseHandler:"+cb);
    script.onerror=()=>{
      cleanup();
      reject(new Error("Google Sheet konnte nicht geladen werden"));
    };

    document.body.appendChild(script);
  });
}

function getRowValues(r){
  const vals=[];
  for(const k of Object.keys(r||{}))vals.push(r[k]);
  return vals;
}

function rowValueByIndex(r,i){
  return getRowValues(r)[i];
}

function pickRowField(r,keys=[],fallbackIndex=null){
  for(const k of keys){
    if(r&&Object.prototype.hasOwnProperty.call(r,k)){
      const v=str(r[k]).trim();
      if(v!=="")return v;
    }
  }
  return Number.isInteger(fallbackIndex)?str(rowValueByIndex(r,fallbackIndex)).trim():"";
}

function buildAddressFromParts(parts){
  return parts.map(v=>str(v).trim()).filter(Boolean).join(", ");
}

function buildCustomerAddress(r){
  const street=pickRowField(r,["straße","strasse","street"],1);
  const plz=pickRowField(r,["plz","postleitzahl","zip"],2);
  const ort=pickRowField(r,["ort","stadt","city"],3);
  const land=pickRowField(r,["land","country"],4);

  return buildAddressFromParts([street,plz,ort,land]) || pickRowField(r,["adresse","address"],null);
}

function buildFirmAddress(r){
  const street=pickRowField(r,["straße","strasse","street"],1);
  const plz=pickRowField(r,["plz","postleitzahl","zip"],2);
  const ort=pickRowField(r,["ort","stadt","city","adresse","address"],3);
  const land=pickRowField(r,["land","country"],4);

  return buildAddressFromParts([street,plz,ort,land]) || pickRowField(r,["adresse","address","ort","stadt","city"],null);
}

function getCustomerAcceptsFromRow(r){
  return {
    lose:isYes(pickRowField(r,["lose","lose pellets","losepellets","pellets lose","lose-pellets"],2)),
    sackware:isYes(pickRowField(r,["sackware","sackware pellets","sackwaren","pellets sackware"],3)),
    industrieware:isYes(pickRowField(r,["industrieware","industrie","industriewaren","sonstige"],4))
  };
}

function getFirmBasePricesFromRow(r){
  return {
    lose:toNum(pickRowField(r,["preis","losepreis","lose preis","basispreis"],5)),
    sackware:toNum(pickRowField(r,["sackwarenpreis","sackwarepreis","sackwarenp","sackwarep","preis sackware"],7)),
    industrieware:toNum(pickRowField(r,["industriewarepreis","industriepreis","preis industrieware","industriewar","industrieware"],10))
  };
}

function getFirmProductsFromRow(r,base){
  return {
    lose:isFinite(base.lose)&&base.lose>0,
    sackware:isFinite(base.sackware)&&base.sackware>0,
    industrieware:isFinite(base.industrieware)&&base.industrieware>0
  };
}

async function loadCustomers(){
  const rows=await parseCsv(CONFIG.customersCsvUrl);
  const list=[];

  rows.forEach((r,idx)=>{
    const name=str(r["name"]??r["kundenname"]??r["kunde"]??r["firma"]??r["unternehmen"]).trim();
    const addr=buildCustomerAddress(r);

    if(!addr)return;

    const latKunde=toNum(pickRowField(r,["lat","latitude","breitengrad"],18));
    const lonKunde=toNum(pickRowField(r,["lon","lng","longitude","längengrad"],19));

    list.push({
      id:"C"+idx,
      name:name||addr||"Kunde",
      address:addr,
      geoKey:"C_"+normText(name+"_"+addr),
      lat:isFinite(latKunde)?latKunde:NaN,
      lon:isFinite(lonKunde)?lonKunde:NaN,
      accepts:getCustomerAcceptsFromRow(r),
      raw:r
    });
  });

  customers=list;
}

async function loadFirms(){
  const rows=await parseCsv(CONFIG.firmsCsvUrl);
  const list=[];

  rows.forEach((r,idx)=>{
    const name=str(r["firma"]??r["name"]).trim();
    const addr=buildFirmAddress(r);

    if(!addr)return;

    const base=getFirmBasePricesFromRow(r);
    const products=getFirmProductsFromRow(r,base);
    const certRaw=str(r["zertifikat"]??r["zertifikate"]??r["zertifikat(e)"]).trim();

    list.push({
      id:"F"+idx,
      name:name||"Firma",
      address:addr,
      geoKey:"F_"+normText(name+"_"+addr),
      base,
      products,
      certificateRaw:certRaw,
      certificates:normalizeCertificates(certRaw),
      lat:toNum(pickRowField(r,["lat","latitude","breitengrad"],18)),
      lon:toNum(pickRowField(r,["lon","lng","longitude","längengrad"],19)),
      raw:r
    });
  });

  firms=list;
}

function normalizeCertificateValue(v){
  let s=String(v||"").trim().toLowerCase().replace(/\s+/g," ");
  if(!s)return "";
  if(["enplus","en plus","en-plus"].includes(s))return"enplus";
  if(["dinplus","din plus","din-plus"].includes(s))return"dinplus";
  if(s==="sure")return"sure";
  if(s==="cpp")return"cpp";
  if(["kein zertifikat","ohne zertifikat","keine","kein","ohne"].includes(s))return"kein zertifikat";
  return s;
}

function normalizeCertificates(raw){
  const txt=String(raw||"").trim();
  if(!txt)return["kein zertifikat"];
  const arr=txt.split(/[,;/|]+/).map(normalizeCertificateValue).filter(Boolean);
  return arr.length?[...new Set(arr)]:["kein zertifikat"];
}

function getSelectedCertificates(){
  return Array.from(document.querySelectorAll("#certificateMenu input"))
    .filter(cb=>cb.checked)
    .map(cb=>cb.value);
}

function matchesCertificateFilter(f){
  const s=getSelectedCertificates();
  if(!s.length)return true;

  let c=(f.certificates||[]).map(normalizeCertificateValue);
  if(!c.length)c=["kein zertifikat"];

  return s.some(x=>c.includes(normalizeCertificateValue(x)));
}

function certificateLabel(v){
  return ({
    enplus:"EnPlus",
    dinplus:"DINplus",
    sure:"SURE",
    cpp:"CPP",
    "kein zertifikat":"Kein Zertifikat"
  }[v]||v||"—");
}

function productLabel(p){
  return ({
    lose:"Lose",
    sackware:"Sackware",
    industrieware:"Industrieware"
  }[p]||p);
}

function firmHasProduct(f,p){
  return !!(f?.products?.[p]||(isFinite(f?.base?.[p])&&f.base[p]>0));
}

function customerMatchesSelectedProduct(c,p){
  return !!(c?.accepts?.[p]||false);
}

function cacheKeysFor(item){
  return [normAddr(item.address),item.geoKey].filter(Boolean);
}

function applyCoordsFromCache(item){
  for(const k of cacheKeysFor(item)){
    const h=geoCache[k];
    if(h&&isFinite(h.lat)&&isFinite(h.lon)){
      item.lat=h.lat;
      item.lon=h.lon;
      return true;
    }
  }
  return false;
}

function saveCoordsToCache(item,lat,lon){
  for(const k of cacheKeysFor(item)){
    geoCache[k]={lat,lon,address:item.address,name:item.name,ts:Date.now()};
  }
  saveLS(LS_GEO_CACHE_KEY,geoCache);
}

function applyCacheCoordsOnly(){
  customers.forEach(applyCoordsFromCache);
  firms.forEach(applyCoordsFromCache);
}

async function geocodeItem(item){
  if(isFinite(item.lat)&&isFinite(item.lon))return {lat:item.lat,lon:item.lon};
  if(applyCoordsFromCache(item))return {lat:item.lat,lon:item.lon};

  const q=item.address;
  if(!q)return null;

  try{
    const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q);
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    const data=await res.json();

    if(data&&data[0]){
      const lat=parseFloat(data[0].lat);
      const lon=parseFloat(data[0].lon);

      if(isFinite(lat)&&isFinite(lon)){
        item.lat=lat;
        item.lon=lon;
        saveCoordsToCache(item,lat,lon);
        return {lat,lon};
      }
    }
  }catch(e){
    console.warn("Geocode Fehler",item.name,e);
  }

  return null;
}

async function geocodeAll(){
  const all=[...customers,...firms];

  for(const item of all){
    if(isFinite(item.lat)&&isFinite(item.lon))continue;
    await geocodeItem(item);
    renderMarkers();
    updateLoadStatusCounts("Geocode läuft");
    await sleep(CONFIG.geocodeDelayMs);
  }

  renderMarkers();
  updateLoadStatusCounts("✅ Fertig");
}

function updateLoadStatusCounts(prefix=""){
  const c=customers.filter(x=>isFinite(x.lat)&&isFinite(x.lon)).length;
  const f=firms.filter(x=>isFinite(x.lat)&&isFinite(x.lon)).length;

  setLoadStatus(`${prefix}${prefix?" · ":""}Kunden ${c}/${customers.length} · Firmen ${f}/${firms.length}`);
}

function setLoadStatus(t){
  document.getElementById("loadStatus").innerHTML=`<span class="dot"></span> ${esc(t)}`;
}

function makeSvgPin(shape,color){
  const svg=shape==="triangle"
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42"><polygon points="17,3 32,34 2,34" fill="${color}" stroke="#111827" stroke-width="2"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42"><circle cx="17" cy="18" r="12" fill="${color}" stroke="#111827" stroke-width="2"/></svg>`;

  return "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
}

function renderMarkers(){
  for(const e of [...customerEntities,...firmEntities]){
    viewer.entities.remove(e);
  }

  customerEntities=[];
  firmEntities=[];

  customers.forEach(c=>{
    if(!isFinite(c.lat)||!isFinite(c.lon))return;

    const ent=viewer.entities.add({
      id:c.id,
      name:c.name,
      position:Cesium.Cartesian3.fromDegrees(c.lon,c.lat,0),
      billboard:{
        image:makeSvgPin("triangle",getCss("--cust")),
        scale:selectedCustomer?.id===c.id?1.4:1,
        verticalOrigin:Cesium.VerticalOrigin.BOTTOM
      },
      description:`<b>${esc(c.name)}</b><br>${esc(c.address)}<br>Kunde`
    });

    ent._ref=c;
    ent._kind="kunde";
    customerEntities.push(ent);
  });

  firms.forEach(f=>{
    if(!isFinite(f.lat)||!isFinite(f.lon))return;

    const ent=viewer.entities.add({
      id:f.id,
      name:f.name,
      position:Cesium.Cartesian3.fromDegrees(f.lon,f.lat,0),
      billboard:{
        image:makeSvgPin("circle",getCss("--firm")),
        scale:selectedFirm?.id===f.id?1.35:1,
        verticalOrigin:Cesium.VerticalOrigin.BOTTOM
      },
      description:`<b>${esc(f.name)}</b><br>${esc(f.address)}<br>Firma`
    });

    ent._ref=f;
    ent._kind="firma";
    firmEntities.push(ent);
  });
}

function getCss(n){
  return getComputedStyle(document.body).getPropertyValue(n).trim();
}

function initGlobeClickHandlers(){
  const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

  handler.setInputAction(click=>{
    const picked=viewer.scene.pick(click.position);

    if(Cesium.defined(picked)&&picked.id&&picked.id._ref){
      const ent=picked.id;
      const ref=ent._ref;

      if(ent._kind==="kunde"){
        if(getSearchType()==="kunden")selectCustomer(ref);
      }

      if(ent._kind==="firma"){
        if(getSearchType()==="firmen")selectFirm(ref);
      }

      return;
    }

    if(drawingZone){
      const cart=viewer.camera.pickEllipsoid(click.position,viewer.scene.globe.ellipsoid);
      if(!cart)return;

      const cg=Cesium.Cartographic.fromCartesian(cart);
      const lon=Cesium.Math.toDegrees(cg.longitude);
      const lat=Cesium.Math.toDegrees(cg.latitude);

      zonePoints.push([lat,lon]);

      drawPointEntities.push(viewer.entities.add({
        position:Cesium.Cartesian3.fromDegrees(lon,lat,0),
        point:{
          pixelSize:9,
          color:Cesium.Color.YELLOW,
          outlineColor:Cesium.Color.BLACK,
          outlineWidth:2
        }
      }));

      updateTempZone();
    }
  },Cesium.ScreenSpaceEventType.LEFT_CLICK);
}

function updateTempZone(){
  if(zoneEntity)viewer.entities.remove(zoneEntity);

  if(zonePoints.length>=3){
    zoneEntity=viewer.entities.add({
      polygon:{
        hierarchy:Cesium.Cartesian3.fromDegreesArray(zonePoints.flatMap(p=>[p[1],p[0]])),
        material:Cesium.Color.YELLOW.withAlpha(.22),
        outline:true,
        outlineColor:Cesium.Color.YELLOW
      }
    });
  }
}

function startDrawZone(){
  drawingZone=true;
  zonePoints=[];
  clearZone(false);
  setLoadStatus("Zone zeichnen: Punkte auf Globus anklicken · dann ✅ Fertig");
}

function finishZone(){
  drawingZone=false;

  drawPointEntities.forEach(e=>viewer.entities.remove(e));
  drawPointEntities=[];

  saveLS(LS_ZONE_KEY,zonePoints);
  setLoadStatus("✅ Zone gespeichert");
}

function clearZone(recalc=true){
  drawingZone=false;

  if(zoneEntity){
    viewer.entities.remove(zoneEntity);
    zoneEntity=null;
  }

  drawPointEntities.forEach(e=>viewer.entities.remove(e));
  drawPointEntities=[];
  zonePoints=[];

  saveLS(LS_ZONE_KEY,null);
}

function restoreZoneFromLS(){
  const pts=loadLS(LS_ZONE_KEY,[]);
  if(Array.isArray(pts)&&pts.length>=3){
    zonePoints=pts;
    updateTempZone();
  }
}

function pointInZone(lat,lon){
  if(!zonePoints||zonePoints.length<3)return true;

  let inside=false;

  for(let i=0,j=zonePoints.length-1;i<zonePoints.length;j=i++){
    const xi=zonePoints[i][0];
    const yi=zonePoints[i][1];
    const xj=zonePoints[j][0];
    const yj=zonePoints[j][1];

    const inter=((yi>lon)!==(yj>lon)) &&
      (lat<(xj-xi)*(lon-yi)/((yj-yi)||1e-12)+xi);

    if(inter)inside=!inside;
  }

  return inside;
}

function initUI(){
  document.getElementById("btnGeo").onclick=geocodeAll;
  document.getElementById("btnCalc").onclick=calculate;

  document.getElementById("btnTheme").onclick=()=>{
    document.body.classList.toggle("dark");
    saveLS(LS_THEME_KEY,document.body.classList.contains("dark")?"dark":"light");
    renderMarkers();
  };

  document.getElementById("btnZoneDraw").onclick=startDrawZone;
  document.getElementById("btnZoneFinish").onclick=finishZone;
  document.getElementById("btnZoneClear").onclick=()=>clearZone(true);

  document.getElementById("closePanel").onclick=()=>{
    document.getElementById("panel").classList.add("hidden");
  };

  document.getElementById("product").onchange=()=>{
    renderMarkers();
    if(getOrigin())calculate();
  };

  document.getElementById("searchType").addEventListener("change",()=>{
    selectedCustomer=null;
    selectedFirm=null;
    lastResults=[];
    clearRoute();
    document.getElementById("results").innerHTML="";
    updateOriginKpi(null);
    updateModeUI();
    renderMarkers();
  });
}

function initSearch(){
  const input=document.getElementById("custSearch");
  const ac=document.getElementById("ac");

  function pos(){
    const r=input.getBoundingClientRect();
    ac.style.left=r.left+"px";
    ac.style.top=r.bottom+8+"px";
    ac.style.minWidth=Math.max(280,r.width)+"px";
  }

  function list(){
    return getSearchType()==="kunden"?customers:firms;
  }

  function show(qRaw){
    const q=(qRaw||"").trim().toLowerCase();
    ac.innerHTML="";

    if(!q){
      ac.style.display="none";
      return;
    }

    const out=list().filter(x=>
      (x.name||"").toLowerCase().includes(q) ||
      (x.address||"").toLowerCase().includes(q)
    ).slice(0,30);

    if(!out.length){
      ac.style.display="none";
      return;
    }

    out.forEach(x=>{
      const d=document.createElement("div");
      d.className="item";
      d.innerHTML=`
        <div class="name">${esc(x.name)}</div>
        <div class="addr">${esc(x.address)}</div>
        <div class="tag">${getSearchType()==="kunden"?"Kunde":"Firma"}</div>
      `;

      d.onclick=()=>{
        getSearchType()==="kunden"?selectCustomer(x):selectFirm(x);
        ac.style.display="none";
      };

      ac.appendChild(d);
    });

    ac.style.display="block";
  }

  input.onfocus=()=>{
    pos();
    show(input.value);
  };

  input.oninput=()=>{
    pos();
    show(input.value);
  };

  document.addEventListener("click",e=>{
    if(!ac.contains(e.target)&&e.target!==input)ac.style.display="none";
  });
}

function initCertificateFilters(){
  const btn=document.getElementById("certificateBtn");
  const menu=document.getElementById("certificateMenu");

  btn.onclick=e=>{
    e.stopPropagation();
    menu.classList.toggle("open");
  };

  menu.querySelectorAll("input").forEach(cb=>{
    cb.onchange=()=>{
      const selected=getSelectedCertificates();
      btn.textContent=selected.length?selected.map(certificateLabel).join(", "):"Alle Zertifikate";
      if(getOrigin())calculate();
    };
  });

  document.addEventListener("click",()=>{
    menu.classList.remove("open");
  });
}

function getInputs(){
  const factor=toNum(document.getElementById("factor").value);

  return {
    product:document.getElementById("product").value,
    radiusKm:toNum(document.getElementById("radiusKm").value)||250,
    qtyT:Math.max(.1,toNum(document.getElementById("qtyT").value)||24),
    freightPerKm:toNum(document.getElementById("freightPerKm").value)||1.85,
    factor:isFinite(factor)?factor:1.05,
    targetVk:toNum(document.getElementById("targetVk").value)
  };
}

function getSearchType(){
  return document.getElementById("searchType").value;
}

function getOrigin(){
  return getSearchType()==="kunden"?selectedCustomer:selectedFirm;
}

function selectCustomer(c){
  selectedCustomer=c;
  selectedFirm=null;

  updateOriginKpi(c);
  renderMarkers();

  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(c.lon,c.lat,250000),
    duration:1
  });

  document.getElementById("panel").classList.remove("hidden");
}

function selectFirm(f){
  selectedFirm=f;
  selectedCustomer=null;

  updateOriginKpi(f);
  renderMarkers();

  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(f.lon,f.lat,250000),
    duration:1
  });

  document.getElementById("panel").classList.remove("hidden");
}

function updateOriginKpi(o){
  document.getElementById("kpiOriginLabel").textContent=getSearchType()==="kunden"?"Kunde":"Firma";
  document.getElementById("kpiCustomer").textContent=o?.name||"—";
  document.getElementById("kpiCustomerAddr").textContent=o?.address||"—";

  if(!o){
    document.getElementById("kpiCount").textContent="—";
    document.getElementById("kpiQty").textContent="Menge: —";
  }
}

function updateModeUI(){
  const firmMode=getSearchType()==="firmen";

  document.getElementById("radiusWrapDesktop").style.display=firmMode?"none":"";
  document.getElementById("btnZoneDraw").style.display=firmMode?"inline-flex":"none";
  document.getElementById("btnZoneFinish").style.display=firmMode?"inline-flex":"none";
  document.getElementById("btnZoneClear").style.display=firmMode?"inline-flex":"none";
}

async function calculate(){
  const out=document.getElementById("results");
  out.innerHTML="";
  clearRoute();

  const mode=getSearchType();
  const origin=getOrigin();
  const inp=getInputs();

  if(!origin||!isFinite(origin.lat)||!isFinite(origin.lon)){
    out.innerHTML=`<div class="small">Bitte zuerst ${mode==="kunden"?"einen Kunden":"eine Firma"} auswählen oder geocoden.</div>`;
    return;
  }

  document.getElementById("kpiQty").textContent=`Menge: ${fmt(inp.qtyT,1)} t`;

  let candidates=[];

  if(mode==="kunden"){
    for(const f of firms){
      if(!isFinite(f.lat)||!isFinite(f.lon))continue;
      if(!matchesCertificateFilter(f))continue;
      if(!firmHasProduct(f,inp.product))continue;

      if(haversineKm(f.lat,f.lon,origin.lat,origin.lon)>inp.radiusKm)continue;

      const base=f.base[inp.product];

      if(isFinite(base)&&base>0)candidates.push({entity:f,base});
    }
  }else{
    const base=origin.base?.[inp.product];

    if(!isFinite(base)||base<=0){
      out.innerHTML=`<div class="small">Für diese Firma fehlt der Basispreis.</div>`;
      return;
    }

    for(const c of customers){
      if(!isFinite(c.lat)||!isFinite(c.lon))continue;
      if(!customerMatchesSelectedProduct(c,inp.product))continue;
      if(zonePoints.length>=3&&!pointInZone(c.lat,c.lon))continue;

      candidates.push({entity:c,base});
    }
  }

  if(!candidates.length){
    document.getElementById("kpiCount").textContent="0";
    out.innerHTML="<div class='small'>Keine Treffer gefunden.</div>";
    return;
  }

  out.innerHTML="<div class='small'>Route wird berechnet …</div>";

  const routed=await runWithConcurrency(candidates,CONFIG.routeConcurrency,async item=>{
    const route=await getRouteData(
      mode==="kunden"?item.entity:origin,
      mode==="kunden"?origin:item.entity
    );

    if(!route||!isFinite(route.km))return null;

    const freightPerT=(route.km*inp.freightPerKm)/inp.qtyT;
    const deliveredPerT=(item.base+freightPerT)*inp.factor;
    const deliveredTotal=deliveredPerT*inp.qtyT;
    const marginPerT=isFinite(inp.targetVk)?inp.targetVk-deliveredPerT:NaN;

    return {
      entity:item.entity,
      base:item.base,
      routeKm:route.km,
      durationMin:route.minutes,
      routeData:route,
      freightPerT,
      deliveredPerT,
      deliveredTotal,
      marginPerT
    };
  });

  const results=routed.filter(Boolean).sort((a,b)=>a.deliveredPerT-b.deliveredPerT);
  lastResults=results;

  const avgPrice=results.length
    ? results.reduce((sum,r)=>sum+r.deliveredPerT,0)/results.length
    : NaN;

  document.getElementById("kpiCount").textContent=String(results.length);

  document.getElementById("kpiQty").innerHTML=
    `Menge: ${fmt(inp.qtyT,1)} t<br>
     <span style="font-size:15px;font-weight:900;color:#2563eb">
       Ø Preis: ${fmt(avgPrice)} €/t
     </span>`;

  if(!results.length){
    out.innerHTML="<div class='small'>Keine Treffer mit echter Route gefunden.</div>";
    return;
  }

  const table=document.createElement("table");

  table.innerHTML=`
    <thead>
      <tr>
        <th>${mode==="kunden"?"Firma":"Kunde"}</th>
        <th>KM</th>
        <th>Preis</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tb=table.querySelector("tbody");

  results.forEach(row=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>
        <b>${esc(row.entity.name)}</b><br>
        <span class="small">${esc(row.entity.address)} · Basis ${fmt(row.base)} €/t · Fracht ${fmt(row.freightPerT)} €/t</span>
      </td>
      <td>${fmt(row.routeKm,0)}</td>
      <td>
        <b>${fmt(row.deliveredPerT)} €/t</b><br>
        <span class="small">${fmt(row.deliveredTotal)} € für ${fmt(inp.qtyT,1)} t</span>
      </td>
    `;

    tr.onclick=()=>showRouteDetails(origin,row.entity,row);

    tb.appendChild(tr);
  });

  out.innerHTML="";
  out.appendChild(table);
}

function routeCacheKey(a,b){
  return `${a.lat.toFixed(5)},${a.lon.toFixed(5)}__${b.lat.toFixed(5)},${b.lon.toFixed(5)}`;
}

async function fetchJsonWithTimeout(url,ms){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);

  try{
    const r=await fetch(url,{signal:c.signal});
    if(!r.ok)throw new Error("HTTP "+r.status);
    return await r.json();
  }finally{
    clearTimeout(t);
  }
}

async function getRouteData(a,b){
  if(!a||!b||!isFinite(a.lat)||!isFinite(a.lon)||!isFinite(b.lat)||!isFinite(b.lon))return null;

  const key=routeCacheKey(a,b);
  if(routeCache[key])return routeCache[key];

  const url=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=full&geometries=geojson`;

  for(let i=0;i<=CONFIG.routeRetryCount;i++){
    try{
      const data=await fetchJsonWithTimeout(url,CONFIG.routeTimeoutMs);

      if(data?.routes?.[0]){
        const r=data.routes[0];

        const out={
          km:r.distance/1000,
          minutes:r.duration/60,
          geometry:r.geometry
        };

        routeCache[key]=out;
        saveLS(LS_ROUTE_CACHE_KEY,routeCache);

        return out;
      }
    }catch(e){
      await sleep(CONFIG.routeRetryDelayMs);
    }
  }

  return null;
}

function clearRoute(){
  if(routeEntity){
    viewer.entities.remove(routeEntity);
    routeEntity=null;
  }

  document.getElementById("kpiRoute").textContent="—";
}

async function showRouteDetails(origin,target,row){
  clearRoute();

  document.getElementById("kpiRoute").textContent="Route lädt …";

  const route=await getRouteData(origin,target);

  if(!route){
    document.getElementById("kpiRoute").textContent="Keine Route";
    return;
  }

  if(route.geometry?.coordinates){
    const arr=route.geometry.coordinates.flatMap(([lon,lat])=>[lon,lat,12000]);

    routeEntity=viewer.entities.add({
      polyline:{
        positions:Cesium.Cartesian3.fromDegreesArrayHeights(arr),
        width:4,
        material:Cesium.Color.fromCssColorString("#2563eb").withAlpha(.95),
        clampToGround:false
      }
    });

    viewer.flyTo(routeEntity);
  }

  document.getElementById("kpiRoute").textContent=
    `${fmt(route.km,0)} km${isFinite(route.minutes)?" · "+fmt(route.minutes,0)+" min":""}`;
}

async function runWithConcurrency(items,limit,worker){
  const out=new Array(items.length);
  let i=0;

  async function next(){
    while(i<items.length){
      const n=i++;
      out[n]=await worker(items[n],n);
    }
  }

  await Promise.all(Array.from({length:Math.min(limit,items.length)},next));
  return out;
}

function haversineKm(a,b,c,d){
  const R=6371;
  const rad=x=>x*Math.PI/180;
  const dLat=rad(c-a);
  const dLon=rad(d-b);

  const x=
    Math.sin(dLat/2)**2+
    Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dLon/2)**2;

  return 2*R*Math.asin(Math.sqrt(x));
}

function applyThemeFromLS(){
  if(loadLS(LS_THEME_KEY,"light")==="dark"){
    document.body.classList.add("dark");
  }
}
